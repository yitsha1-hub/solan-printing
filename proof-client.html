<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>העלאת קבצים לדפוס — סולן הדפסות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root { --press:#2d3561; --green:#16a34a; --red:#dc2626; --line:#e5e7eb; --ink:#1f2937; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui,"Segoe UI",Arial,sans-serif; background:#f3f4f6; color:var(--ink); padding:16px; }
  .wrap { max-width: 1500px; margin:0 auto; }
  header { text-align:center; margin-bottom:12px; }
  header h1 { font-size:1.2rem; margin:0; } header .sub { color:#6b7280; font-size:.85rem; margin-top:3px; }
  .hint { background:#eef2ff; border:1px solid #c7d2fe; color:#3730a3; padding:9px 13px; border-radius:10px; font-size:.83rem; margin-bottom:12px; }
  .choice { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
  .choice button { flex:1; min-width:220px; padding:22px; border:2px solid var(--line); border-radius:14px; background:#fff; cursor:pointer; font-size:1.05rem; font-weight:800; color:var(--press); }
  .choice button:hover { border-color:var(--press); background:#f8faff; }
  .choice .em { display:block; font-size:1.7rem; margin-bottom:6px; }
  .choice .d { display:block; font-size:.78rem; font-weight:500; color:#6b7280; margin-top:6px; }
  .parts { background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:8px; }
  .parts h3 { font-size:.9rem; margin:4px 0 8px; }
  .parts .row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); font-size:.88rem; }
  .parts .row:last-child { border-bottom:none; } .parts .ok { color:var(--green); font-weight:700; }
  .drop { border:2.5px dashed #c7d2fe; border-radius:14px; padding:22px; text-align:center; background:#fff; cursor:pointer; margin-bottom:12px; }
  .drop.over { background:#eef2ff; } .drop b { color:var(--press); }

  #workspace { display:flex; gap:16px; align-items:flex-start; }
  #sidebar { width:210px; flex:0 0 210px; max-height:82vh; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
             background:#eef0f4; border:1px solid var(--line); border-radius:12px; padding:10px; }
  .sb-title { font-size:.8rem; font-weight:800; color:var(--press); text-align:center; padding:2px 0 4px; }
  .thumb { position:relative; border:1.5px solid #cbd2dd; border-radius:8px; overflow:hidden; background:#fff; cursor:grab; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .thumb.active { outline:3px solid var(--press); box-shadow:0 2px 10px rgba(45,53,97,.35); }
  .thumb.dragging { opacity:.4; } .thumb.dragover { outline:3px dashed var(--press); }
  .thumb img { display:block; width:100%; height:auto; background:#fff; }
  .thumb .n { position:absolute; top:5px; right:5px; background:var(--press); color:#fff; font-size:.82rem; font-weight:800; border-radius:14px; padding:2px 9px; box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .thumb .tools { position:absolute; bottom:0; left:0; right:0; display:flex; }
  .thumb .tools button { flex:1; border:none; padding:6px 0; font-size:.82rem; font-weight:700; cursor:pointer; color:#fff; }
  .thumb .rep { background:rgba(45,53,97,.92); } .thumb .rm { background:rgba(220,38,38,.92); }

  #viewer { flex:1; min-width:0; background:#fff; border-radius:10px; }
  #spread { display:flex; gap:3px; justify-content:center; background:#d1d5db; padding:10px; border-radius:8px; min-height:55vh; align-items:center; }
  #spread .page { position:relative; display:inline-block; line-height:0; }
  #spread .page.drop-on { outline:4px dashed var(--press); outline-offset:-2px; }
  #spread img { display:block; height:78vh; width:auto; max-width:48vw; background:#fff; box-shadow:0 3px 12px rgba(0,0,0,.2); }
  #spread .trim { position:absolute; border:1.5px dashed #e11d48; box-sizing:border-box; pointer-events:none; }
  #spread .pgdel { position:absolute; top:8px; left:8px; width:34px; height:34px; border:none; border-radius:50%;
    background:rgba(220,38,38,.92); color:#fff; font-size:1.05rem; font-weight:800; cursor:pointer; line-height:1;
    box-shadow:0 2px 6px rgba(0,0,0,.35); z-index:3; }
  #spread .pgdel:hover { background:#b91c1c; }
  #spread .pgnum { position:absolute; bottom:8px; right:8px; background:var(--press); color:#fff; font-size:.8rem;
    font-weight:800; border-radius:14px; padding:2px 10px; line-height:1.3; box-shadow:0 1px 4px rgba(0,0,0,.4); }
  #spread .ph { color:#6b7280; font-size:.9rem; padding:40px; }
  .legend { text-align:center; font-size:.74rem; color:#9a3412; margin-top:6px; }
  .legend b { color:#e11d48; }
  #warnBox { background:#fff7ed; border:1.5px solid #fdba74; color:#9a3412; padding:11px 14px; border-radius:10px; font-size:.84rem; margin-bottom:12px; }
  #warnBox b { color:#c2410c; } #warnBox .bad { font-weight:700; }
  #vnav { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:10px; padding-bottom:8px; flex-wrap:wrap; }
  #vnav button { font-size:1rem; padding:7px 14px; border:1.5px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; }
  #vnav button:disabled { opacity:.35; cursor:default; }
  #vlabel { min-width:120px; text-align:center; font-variant-numeric:tabular-nums; font-size:.88rem; }
  #viewer:fullscreen { background:#111; display:flex; flex-direction:column; justify-content:center; padding:10px; }
  #viewer:fullscreen #spread { background:#111; flex:1; }
  #viewer:fullscreen #spread img { height:86vh; max-width:48%; }
  #viewer:fullscreen #vlabel { color:#fff; }

  .bottom { position:sticky; bottom:0; background:#f3f4f6; padding:13px 0; margin-top:14px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn { padding:13px 26px; border:none; border-radius:10px; font-size:1.02rem; font-weight:800; cursor:pointer; }
  .add { background:#fff; color:var(--press); border:1.5px solid var(--line); }
  .approve { background:var(--green); color:#fff; min-width:230px; } .back { background:#fff; color:#6b7280; border:1.5px solid var(--line); }
  .btn:disabled { opacity:.45; cursor:default; }
  #overlay { position:fixed; inset:0; background:rgba(255,255,255,.96); display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; text-align:center; padding:24px; z-index:50; white-space:pre-line; }
  #ovBar { width:300px; max-width:82vw; height:16px; background:var(--line); border-radius:9px; overflow:hidden; display:none; position:relative; }
  #ovBar > div { height:100%; width:0; background:linear-gradient(90deg,#2d3561,#16a34a); transition:width .15s; }
  #ovPct { font-size:2.6rem; font-weight:900; color:var(--press); line-height:1; display:none; font-variant-numeric:tabular-nums; }
  #status { text-align:center; padding:30px; font-size:1.15rem; font-weight:700; }
  .hidden { display:none !important; }
  @media (max-width:680px){ #workspace{flex-direction:column} #sidebar{width:100%;flex:none;flex-direction:row;max-height:none;overflow-x:auto} .sb-title{display:none} .thumb{flex:0 0 120px} .thumb img{min-height:120px} #spread img{height:52vh;max-width:48%} }
</style>
</head>
<body>
<div id="overlay"><div id="ovText">טוען…</div><div id="ovPct"></div><div id="ovBar"><div></div></div></div>
<div class="wrap">
  <header>
    <h1>העלאת קבצים לדפוס</h1>
    <div class="sub" id="sub">סולן הדפסות</div>
  </header>

  <div id="home" class="hidden">
    <div id="partsBox"></div>
    <div class="hint">בחר/י מה להעלות. אפשר עיתון שלם בבת אחת, או ריצה אחת בכל פעם (ולחזור לקישור הזה בהמשך).</div>
    <div class="choice">
      <button id="chFull"><span class="em">📄</span>עיתון מלא<span class="d">כל העמודים יחד</span></button>
      <button id="chRun"><span class="em">➕</span>ריצה בודדת<span class="d">חלק מהעיתון — אפשר להוסיף עוד בהמשך</span></button>
    </div>
  </div>

  <div id="editor" class="hidden">
    <div class="hint" id="editorHint"></div>
    <div id="warnBox" class="hidden"></div>
    <div class="drop" id="drop">📄 <b>בחרו קבצי PDF</b> או גררו לכאן
      <input type="file" id="file" accept="application/pdf" multiple hidden></div>
    <div id="workspace">
      <div id="sidebar"></div>
      <div id="viewer">
        <div id="spread"><div class="ph">העלו קבצים כדי לצפות ולדפדף</div></div>
        <div id="vnav">
          <button id="vprev">‹ הקודם</button>
          <span id="vlabel"></span>
          <button id="vnext">הבא ›</button>
          <button id="vfs">⛶ מסך מלא</button>
        </div>
        <div class="legend"><b>– – –</b> קו חיתוך נטו (TrimBox)</div>
      </div>
    </div>
    <div class="bottom">
      <button class="btn back" id="backBtn">↩ חזרה</button>
      <button class="btn add" id="addMore">➕ הוסף קבצים</button>
      <button class="btn approve" id="approve" disabled>✓ אשר ושלח לדפוס</button>
    </div>
  </div>

  <div id="status" class="hidden"></div>
</div>

<input type="file" id="repInput" accept="application/pdf" hidden>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const _FBURL   = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
const _BUCKETS = ['solan-printing.firebasestorage.app']; // appspot.com לא קיים (404) — הוסר
const RENDER_H = 1100;          // גובה הרינדור (פעם אחת לעמוד) — חד גם במסך מלא

const $ = id => document.getElementById(id);
const overlay = $('overlay');
function showOverlay(t, on=true, pct=null){
  $('ovText').textContent = t; overlay.style.display = on ? 'flex' : 'none';
  const pctEl = $('ovPct');
  if (pct == null) { $('ovBar').style.display = 'none'; pctEl.style.display = 'none'; pctEl.textContent = ''; }
  else {
    const v = Math.max(0, Math.min(100, Math.round(pct)));
    $('ovBar').style.display = 'block'; $('ovBar').firstElementChild.style.width = v + '%';
    pctEl.style.display = 'block'; pctEl.textContent = v + '%';
  }
}
const show = (id, on=true) => $(id).classList.toggle('hidden', !on);

const proofId = new URLSearchParams(location.search).get('id');
let record = null, mode = null;

const sources = new Map();      // fileId → { bytes }
let pages = [], nextUid = 1, nextFid = 1;   // page: {uid,fileId,pageIndex,src}
let vIndex = 0;

(async function init() {
  if (!proofId) return fail('לא נמצא מזהה בכתובת.');
  try {
    record = await (await fetch(`${_FBURL}/customerProofs/${proofId}.json`)).json();
    if (!record) return fail('הקישור לא תקין או שהוסר.');
    $('sub').textContent = [record.customer, record.title].filter(Boolean).join(' · ') || 'סולן הדפסות';
    showOverlay('', false); goHome();
  } catch (e) { console.error(e); fail('שגיאה בטעינה.'); }
})();

function goHome() {
  if (record.mode === 'full' && record.status === 'approved') return done('העיתון כבר אושר ונשלח לדפוס. תודה!');
  pages = []; sources.clear(); vIndex = 0;
  show('editor', false); show('status', false); show('home', true);
  const parts = Object.values(record.parts || {}).sort((a,b)=>(a.approvedAt||0)-(b.approvedAt||0));
  $('partsBox').innerHTML = parts.length
    ? `<div class="parts"><h3>✓ ריצות שכבר נשלחו</h3>${parts.map(p=>`<div class="row"><span>${esc(p.name)}</span><span class="ok">התקבל · ${p.pageCount} עמ'</span></div>`).join('')}</div>`
    : '';
}

$('chFull').onclick = () => startEditor('full');
$('chRun').onclick  = () => startEditor('run');
function startEditor(m) {
  mode = m; pages = []; sources.clear(); vIndex = 0;
  $('editorHint').innerHTML = (m === 'full'
    ? 'העלו את <b>כל עמודי העיתון</b>. דפדפו בתצוגה, וסדרו/החליפו עמודים בסרגל הצד. אתם אחראים על הסדר.'
    : 'העלו את עמודי <b>הריצה</b>. דפדפו וסדרו בסרגל הצד. בסיום אפשר להוסיף ריצה נוספת.')
    + '<br>🎨 <b>שימו לב:</b> ודאו שהקבצים מיוצאים בצבעי <b>CMYK</b> (לא RGB), אחרת ייתכנו הבדלי צבע בדפוס.';
  renderAll(); show('home', false); show('editor', true);
}
$('backBtn').onclick = () => { if (!pages.length || confirm('לחזור? עמודים שטרם אושרו יימחקו.')) goHome(); };

// ── העלאה + רינדור פעם אחת לתמונה ──
$('drop').onclick = () => $('file').click();
$('addMore').onclick = () => $('file').click();
$('file').onchange = e => addFiles(e.target.files);
['dragover','dragenter'].forEach(ev => $('drop').addEventListener(ev, e => { e.preventDefault(); $('drop').classList.add('over'); }));
['dragleave','drop'].forEach(ev => $('drop').addEventListener(ev, e => { e.preventDefault(); $('drop').classList.remove('over'); }));
$('drop').addEventListener('drop', e => addFiles(e.dataTransfer.files));

async function addFiles(fileList) {
  const files = [...fileList].filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  if (!files.length) return;
  // ספירת עמודים כוללת למד התקדמות
  let total = 0, doneN = 0;
  const docs = [];
  showOverlay('קורא קבצים…', true, 0);
  for (const file of files) {
    try {
      const bytes = await file.arrayBuffer();
      const fileId = 'f' + (nextFid++);
      const pdf = await pdfjsLib.getDocument({ data: bytes.slice(0) }).promise;
      sources.set(fileId, { bytes });
      const boxes = await fileBoxes(bytes);
      docs.push({ fileId, pdf, boxes }); total += pdf.numPages;
    } catch (e) { console.error('קובץ נכשל:', file.name, e); }
  }
  for (const d of docs) {
    for (let i = 1; i <= d.pdf.numPages; i++) {
      const box = d.boxes ? d.boxes[i-1] : null;
      const r = await renderPage(d.pdf, i, box);
      pages.push({ uid: nextUid++, fileId: d.fileId, pageIndex: i-1, src: r.src, trimFrac: r.trimFrac, wmm: r.wmm, hmm: r.hmm });
      doneN++; showOverlay('מעבד עמודים…', true, Math.round(doneN/total*100));
      if (doneN % 3 === 0) renderAll();    // עדכון הדרגתי
    }
    d.pdf.cleanup && d.pdf.cleanup();
  }
  $('file').value = '';
  renderAll(); showOverlay('', false);
}

// קריאת תיבות העמוד (MediaBox/TrimBox) מ-PDF המקורי
async function fileBoxes(bytes) {
  try {
    const doc = await PDFLib.PDFDocument.load(bytes);
    return doc.getPages().map(pg => {
      let mb, tb;
      try { mb = pg.getMediaBox(); } catch (e) {}
      try { tb = pg.getTrimBox(); } catch (e) {}
      return { mb, tb };
    });
  } catch (e) { return null; }
}

async function renderPage(pdf, pageNo, box) {
  const page = await pdf.getPage(pageNo);
  const view = page.view;                       // [x0,y0,x1,y1] התיבה שמוצגת
  const vbW = view[2] - view[0], vbH = view[3] - view[1];
  const v1 = page.getViewport({ scale: 1 });
  const scale = Math.min(2.5, RENDER_H / v1.height);
  const vp = page.getViewport({ scale });
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.floor(vp.width)); c.height = Math.max(1, Math.floor(vp.height));
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  page.cleanup();
  const src = c.toDataURL('image/jpeg', 0.82);

  // TrimBox → אחוזים יחסית לתמונה; וגודל נטו לבדיקת גודל
  let trimFrac = null, netW = vbW, netH = vbH;
  if (box && box.tb && box.tb.width && box.tb.height) {
    const tb = box.tb; netW = tb.width; netH = tb.height;
    const l = (tb.x - view[0]) / vbW, t = (view[3] - (tb.y + tb.height)) / vbH,
          w = tb.width / vbW, h = tb.height / vbH;
    if (l > 0.003 || t > 0.003 || w < 0.997 || h < 0.997)
      trimFrac = { l: Math.max(0,l), t: Math.max(0,t), w: Math.min(1,w), h: Math.min(1,h) };
  }
  return { src, trimFrac, wmm: netW * 25.4 / 72, hmm: netH * 25.4 / 72 };
}

// המרה לס"מ→מ"מ: ערך גודל קטן (כמו 16.5 או 24) הוא בס"מ — מכפילים ב-10 כדי שיובן כמ"מ.
// כך "16.5×24" מזוהה כ-165×240, אותו הדבר.
function _toMM(v) { v = +v || 0; return v > 0 && v < 60 ? v * 10 : v; }

// בדיקת גודל מול הגודל שהוגדר לעיתון
function buildWarnings() {
  const reqW = _toMM(record.reqW), reqH = _toMM(record.reqH);
  const wb = $('warnBox');
  if (!reqW || !reqH || !pages.length) { wb.classList.add('hidden'); wb.innerHTML = ''; return; }
  const tol = 1.5;
  const bad = [];
  pages.forEach((p, idx) => {
    if (p.wmm == null) return;
    const ok = (Math.abs(p.wmm - reqW) <= tol && Math.abs(p.hmm - reqH) <= tol) ||
               (Math.abs(p.wmm - reqH) <= tol && Math.abs(p.hmm - reqW) <= tol);
    if (!ok) bad.push(`עמ' ${idx+1} (${Math.round(p.wmm)}×${Math.round(p.hmm)})`);
  });
  if (!bad.length) { wb.classList.add('hidden'); wb.innerHTML = ''; return; }
  wb.classList.remove('hidden');
  wb.innerHTML = `<b>⚠️ גודל לא תואם.</b> הגודל הנדרש: <b>${reqW}×${reqH} מ"מ</b>. ` +
    `העמודים הבאים בגודל שונה: <span class="bad">${bad.join(', ')}</span>. ` +
    `אפשר לתקן ולהעלות מחדש, או לשלוח כך אם זה בכוונה.`;
}

// ── סרגל צד ──
function renderSidebar() {
  const sb = $('sidebar'); sb.innerHTML = '';
  if (pages.length) { const t = document.createElement('div'); t.className='sb-title'; t.textContent = `עמודים (${pages.length}) — גררו לסידור`; sb.appendChild(t); }
  const active = showingPages();
  pages.forEach((p, idx) => {
    const d = document.createElement('div');
    d.className = 'thumb' + (active.includes(idx) ? ' active' : '');
    d.draggable = true; d.dataset.uid = p.uid;
    d.innerHTML = `<img src="${p.src}" alt=""><span class="n">${idx+1}</span>
      <div class="tools"><button class="rep">החלף</button><button class="rm">מחק</button></div>`;
    d.onclick = e => { if (!e.target.closest('.tools')) { vIndex = alignSpread(idx); renderViewer(); renderSidebar(); } };
    d.querySelector('.rep').onclick = e => { e.stopPropagation(); replacePage(p.uid); };
    d.querySelector('.rm').onclick  = e => { e.stopPropagation(); removePage(p.uid); };
    bindDnD(d); sb.appendChild(d);
  });
  $('approve').disabled = pages.length === 0;
}

function removePage(uid) {
  pages = pages.filter(p => p.uid !== uid);
  if (vIndex >= pages.length) vIndex = Math.max(0, pages.length - 1);
  renderAll();
}

let _repUid = null;
function replacePage(uid) { _repUid = uid; $('repInput').value=''; $('repInput').click(); }
$('repInput').onchange = async e => {
  const file = e.target.files[0]; if (!file || _repUid == null) return;
  showOverlay('מחליף עמוד…', true);
  try {
    const bytes = await file.arrayBuffer();
    const fileId = 'f' + (nextFid++);
    const pdf = await pdfjsLib.getDocument({ data: bytes.slice(0) }).promise;
    sources.set(fileId, { bytes });
    const item = pages.find(p => p.uid === _repUid);
    item.fileId = fileId; item.pageIndex = 0; item.src = await renderToImg(pdf, 1);
  } catch (e) { console.error(e); }
  _repUid = null; renderAll(); showOverlay('', false);
};

let dragUid = null;
function bindDnD(el) {
  el.addEventListener('dragstart', () => { dragUid = +el.dataset.uid; el.classList.add('dragging'); });
  el.addEventListener('dragend',   () => { dragUid = null; el.classList.remove('dragging'); document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('dragover')); });
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault(); const t = +el.dataset.uid;
    if (dragUid == null || dragUid === t) return;
    const from = pages.findIndex(p => p.uid === dragUid), to = pages.findIndex(p => p.uid === t);
    const [m] = pages.splice(from, 1); pages.splice(to, 0, m); renderAll();
  });
}

// ── דפדוף (כפולה RTL) — מיידי (תמונות מוכנות) ──
function showingPages() {
  if (!pages.length) return [];
  if (vIndex === 0) return [0];
  const left = vIndex % 2 === 1 ? vIndex : vIndex - 1;
  return [left, left + 1].filter(i => i < pages.length);
}
function alignSpread(idx) { return idx === 0 ? 0 : (idx % 2 === 1 ? idx : idx - 1); }

function renderViewer() {
  const spread = $('spread');
  if (!pages.length) { spread.innerHTML = '<div class="ph">העלו קבצים כדי לצפות ולדפדף</div>'; $('vlabel').textContent=''; return; }
  const s = showingPages();
  $('vlabel').textContent = `עמוד ${s.map(i=>i+1).join('–')} מתוך ${pages.length}`;
  $('vprev').disabled = vIndex <= 0;
  $('vnext').disabled = s[s.length-1] >= pages.length - 1;
  // dir rtl: עמוד נמוך מימין. עוטף ב-.page עם קו חיתוך (TrimBox), כפתור מחיקה, ויעד גרירה.
  spread.innerHTML = s.map(i => {
    const p = pages[i];
    const ov = p.trimFrac
      ? `<div class="trim" style="left:${(p.trimFrac.l*100).toFixed(2)}%;top:${(p.trimFrac.t*100).toFixed(2)}%;width:${(p.trimFrac.w*100).toFixed(2)}%;height:${(p.trimFrac.h*100).toFixed(2)}%"></div>`
      : '';
    return `<div class="page" data-idx="${i}" data-uid="${p.uid}">`
      + `<img src="${p.src}" alt="">${ov}`
      + `<button class="pgdel" title="מחק עמוד זה" data-uid="${p.uid}">✕</button>`
      + `<div class="pgnum">${i+1}</div></div>`;
  }).join('');
  // כפתור מחיקה לכל עמוד בדפדוף
  spread.querySelectorAll('.pgdel').forEach(b => {
    b.onclick = e => { e.stopPropagation(); removePage(+b.dataset.uid); };
  });
  // יעד גרירה: גרירת ממוזערת בודדת מהסרגל אל עמוד בדפדוף → מעבירה אותה למקום הזה
  spread.querySelectorAll('.page').forEach(pg => {
    pg.addEventListener('dragover', e => { e.preventDefault(); pg.classList.add('drop-on'); });
    pg.addEventListener('dragleave', () => pg.classList.remove('drop-on'));
    pg.addEventListener('drop', e => {
      e.preventDefault(); pg.classList.remove('drop-on');
      if (dragUid == null) return;
      const to = +pg.dataset.idx;
      const from = pages.findIndex(p => p.uid === dragUid);
      if (from < 0 || from === to) return;
      const [m] = pages.splice(from, 1);
      pages.splice(to, 0, m);
      vIndex = alignSpread(to);
      renderAll();
    });
  });
}

function step(d) {
  if (vIndex === 0) vIndex = d > 0 ? 1 : 0;
  else vIndex = Math.max(0, Math.min(vIndex + d * 2, pages.length - 1));
  if (vIndex > 0 && vIndex % 2 === 0) vIndex -= 1;
  renderViewer(); renderSidebar();
}
$('vprev').onclick = () => step(-1);
$('vnext').onclick = () => step(+1);
$('vfs').onclick = () => {
  const v = $('viewer');
  if (document.fullscreenElement) document.exitFullscreen();
  else (v.requestFullscreen || v.webkitRequestFullscreen).call(v);
};
document.addEventListener('keydown', e => {
  if ($('editor').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft') step(+1);
  if (e.key === 'ArrowRight') step(-1);
});

function renderAll() { renderSidebar(); renderViewer(); buildWarnings(); }

// ── אישור + העלאה עם מד אחוזים ──
$('approve').onclick = async () => {
  if (!pages.length) return;
  let runName = '';
  if (mode === 'run') {
    const count = Object.keys(record.parts || {}).length;
    runName = (prompt('שם / מספר הריצה:', `ריצה ${count + 1}`) || '').trim();
    if (!runName) return;
  }
  if (!confirm(`לאשר ולשלוח ${pages.length} עמודים בסדר הנוכחי?\nלאחר האישור לא ניתן לשנות.`)) return;
  _uploading = true; await acquireWakeLock();
  try {
    showOverlay('מרכיב קובץ…', true);
    const out = await PDFLib.PDFDocument.create();
    const cache = new Map();
    for (const p of pages) {
      let lib = cache.get(p.fileId);
      if (!lib) { lib = await PDFLib.PDFDocument.load(sources.get(p.fileId).bytes); cache.set(p.fileId, lib); }
      const [cp] = await out.copyPages(lib, [p.pageIndex]); out.addPage(cp);
    }
    const pdfBytes = await out.save();
    const folder = (record.customer || 'לקוח').replace(/[^\p{L}\p{N}_-]+/gu, '_').slice(0, 60) || 'לקוח';

    const onUp = pct => showOverlay('מעלה לדפוס…', true, pct);
    if (mode === 'full') {
      const path = `customerProofs/${folder}/${proofId}/full.pdf`;
      const fileUrl = await uploadBytes(path, pdfBytes, onUp);
      await patch({ status:'approved', mode:'full', fileUrl, filePath:path, fileName:'full.pdf', pageCount:pages.length, fileSize:pdfBytes.byteLength, approvedAt:Date.now() });
      return done('✓ העיתון אושר ונשלח לדפוס. תודה!');
    } else {
      const partId = 'p' + Date.now();
      const path = `customerProofs/${folder}/${proofId}/${partId}.pdf`;
      const fileUrl = await uploadBytes(path, pdfBytes, onUp);
      await fetch(`${_FBURL}/customerProofs/${proofId}/parts/${partId}.json`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:runName, fileUrl, filePath:path, pageCount:pages.length, fileSize:pdfBytes.byteLength, status:'approved', approvedAt:Date.now() }) });
      await patch({ status:'parts', mode:'parts' });
      record = await (await fetch(`${_FBURL}/customerProofs/${proofId}.json`)).json();
      showOverlay('', false); alert(`✓ "${runName}" נשלחה. אפשר להוסיף ריצה נוספת או לסגור.`); goHome();
    }
  } catch (e) { console.error(e); showOverlay('שגיאה: ' + e.message + '\n\nנסו שוב או פנו לבית הדפוס.', true); }
  finally { _uploading = false; releaseWakeLock(); }
};

async function patch(fields) {
  await fetch(`${_FBURL}/customerProofs/${proofId}.json`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(fields) });
}

// העלאה עם מד אחוזים (XHR), עם ניסיונות חוזרים על תקלות רשת זמניות (למשל מעבר חלון).
// שגיאת הרשאה (403) מזוהה ומדווחת בנפרד — סימן שכללי Firebase Storage חוסמים כתיבה.
async function uploadBytes(path, bytes, onProgress) {
  let lastErr;
  for (const bucket of _BUCKETS) {
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        const json = await xhrPost(`https://firebasestorage.googleapis.com/v0/b/${bucket}/o?name=${encodeURIComponent(path)}`, bytes, onProgress);
        const token = (json.downloadTokens || '').split(',')[0] || '';
        return `https://firebasestorage.googleapis.com/v0/b/${bucket}/o/${encodeURIComponent(path)}?alt=media&token=${token}`;
      } catch (e) {
        lastErr = e;
        if (e.code === 403) throw e;               // הרשאה — אין טעם לנסות שוב
        if (e.code && e.code !== 0 && e.code < 500 && e.code !== 408 && e.code !== 429) break; // שגיאת לקוח קבועה — נסה bucket הבא
        await new Promise(r => setTimeout(r, 1500 * attempt)); // המתנה וניסיון חוזר
      }
    }
  }
  throw lastErr || new Error('העלאה נכשלה');
}
function xhrPost(url, bytes, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.timeout = 0; // ללא timeout — קבצים גדולים
    xhr.setRequestHeader('Content-Type', 'application/pdf');
    xhr.upload.onprogress = e => e.lengthComputable && onProgress && onProgress(Math.round(e.loaded / e.total * 100));
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) { try { resolve(JSON.parse(xhr.responseText)); } catch(e){ const er=new Error('תגובה לא תקינה'); er.code=xhr.status; reject(er);} return; }
      let msg = 'Storage ' + xhr.status;
      if (xhr.status === 403) msg = 'אין הרשאת כתיבה (403) — יש לעדכן את כללי האחסון ב-Firebase';
      const er = new Error(msg); er.code = xhr.status; reject(er);
    };
    xhr.onerror   = () => { const e = new Error('שגיאת רשת'); e.code = 0; reject(e); };
    xhr.ontimeout = () => { const e = new Error('פג זמן ההעלאה'); e.code = 408; reject(e); };
    xhr.send(bytes);
  });
}

// Wake Lock — מונע מהמכשיר/מסך להירדם בזמן עיבוד והעלאה, כדי שההעלאה תמשיך גם במעבר חלון
let _wakeLock = null;
async function acquireWakeLock(){ try { if (navigator.wakeLock && !_wakeLock) _wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
function releaseWakeLock(){ try { if (_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch(e){} }
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && _uploading) acquireWakeLock(); });
let _uploading = false;
window.addEventListener('beforeunload', e => { if (_uploading) { e.preventDefault(); e.returnValue = ''; return ''; } });

function done(text){ show('home',false); show('editor',false); showOverlay('',false);
  const s=$('status'); s.classList.remove('hidden'); s.innerHTML=`<div style="color:var(--green);font-size:2.4rem">✓</div>${text}`; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fail(msg){ showOverlay(msg, true); throw new Error(msg); }
</script>

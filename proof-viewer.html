<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>צפייה בעיתון — סולן הדפסות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --press:#2d3561; --press-d:#222a4d; --gold:#c9a84c; --gold-light:#e8d5a3; --line:#e5e7eb; --ink:#1f2937; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Heebo',system-ui,"Segoe UI",Arial,sans-serif; color:var(--ink);
         background:linear-gradient(180deg,#eef1f6 0%,#f5f6f9 100%); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .brandbar { width:100%; background:linear-gradient(135deg,var(--press) 0%,var(--press-d) 100%); color:#fff;
    padding:14px 20px; box-shadow:0 4px 18px rgba(45,53,97,.28); display:flex; align-items:center; justify-content:center;
    gap:13px; position:relative; margin-bottom:12px; }
  .brandbar::after { content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold)); }
  .brandbar .logo { width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,.1);
    border:1.5px solid rgba(201,168,76,.6); display:flex; align-items:center; justify-content:center; font-size:1.35rem; }
  .brandbar h1 { font-size:1.3rem; font-weight:900; margin:0; } .brandbar h1 span { color:var(--gold); }
  .brandbar .tag { font-size:.8rem; color:var(--gold-light); margin-top:1px; }
  header { text-align:center; margin-bottom:8px; padding:0 10px; }
  header h1 { font-size:1.05rem; font-weight:800; margin:0; color:var(--press); } header .sub { color:#6b7280; font-size:.85rem; margin-top:3px; }
  #viewer { width:100%; max-width:1500px; background:#fff; border-radius:10px; }
  #spread { display:flex; gap:3px; justify-content:center; background:#d1d5db; padding:10px; border-radius:8px;
            min-height:55vh; align-items:center; }
  #spread .page { display:inline-flex; flex-direction:column; align-items:center; gap:5px; line-height:0; }
  #spread img { display:block; height:80vh; width:auto; max-width:48vw; background:#fff; box-shadow:0 3px 12px rgba(0,0,0,.2); }
  /* מספר עמוד — תווית עזר מתחת לעמוד ובשקיפות (לא חלק מהעיתון) */
  #spread .pgnum { line-height:1; color:#6b7280; opacity:.5; font-size:.82rem; font-weight:700; }
  #spread .ph { color:#6b7280; font-size:.95rem; padding:50px; }
  #vnav { display:flex; align-items:center; justify-content:center; gap:14px; margin:10px 0; flex-wrap:wrap; }
  #vnav button { font-size:1rem; padding:8px 16px; border:1.5px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; }
  #vnav button:disabled { opacity:.35; cursor:default; }
  #vlabel { min-width:130px; text-align:center; font-variant-numeric:tabular-nums; font-size:.9rem; }
  #viewer:fullscreen { background:#111; display:flex; flex-direction:column; justify-content:center; padding:6px; }
  #viewer:fullscreen #spread { background:#111; flex:1; min-height:0; padding:4px; }
  #viewer:fullscreen #spread img { height:auto; width:auto; max-height:90vh; max-width:48vw; }
  #viewer:fullscreen #spread .page:only-child img { max-width:94vw; max-height:92vh; }
  #viewer:fullscreen #vlabel { color:#fff; }
  #overlay { position:fixed; inset:0; background:rgba(255,255,255,.95); display:flex; align-items:center;
             justify-content:center; flex-direction:column; gap:12px; z-index:50; text-align:center; padding:24px; white-space:pre-line; }
  #ovBar { width:280px; max-width:80vw; height:12px; background:var(--line); border-radius:7px; overflow:hidden; display:none; }
  #ovBar > div { height:100%; width:0; background:linear-gradient(90deg,#2d3561,#16a34a); transition:width .15s; }
  .parts-pick { display:flex; flex-direction:column; gap:10px; max-width:480px; width:100%; }
  .parts-pick a { display:block; padding:14px 18px; background:#fff; border:1.5px solid var(--line); border-radius:10px;
    text-decoration:none; color:var(--press); font-weight:800; font-size:1rem; text-align:center; }
  @media (max-width:680px){ #spread img{height:auto;max-height:60vh;width:auto;max-width:96vw} }
</style>
</head>
<body>
<div id="overlay"><div id="ovText">טוען עיתון…</div><div id="ovBar"><div></div></div></div>
<div class="brandbar">
  <div class="logo">🖨️</div>
  <div style="text-align:center">
    <h1>סולן הדפסות <span>בע"מ</span></h1>
    <div class="tag">צפייה בעיתון — סדר עמודים מאושר</div>
  </div>
</div>
<header>
  <h1 id="ttl">👁 צפייה בעיתון</h1>
  <div class="sub" id="sub">סולן הדפסות</div>
</header>

<div id="viewer" class="hidden">
  <div id="spread"><div class="ph">טוען…</div></div>
  <div id="vnav">
    <button id="vprev">‹ הקודם</button>
    <span id="vlabel"></span>
    <button id="vnext">הבא ›</button>
    <button id="vfs">⛶ מסך מלא</button>
  </div>
</div>

<div id="picker" class="hidden" style="padding:10px"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';
const RENDER_H = 1100;

const $ = id => document.getElementById(id);
const overlay = $('overlay');
function showOverlay(t, on=true, pct=null){
  $('ovText').textContent = t; overlay.style.display = on ? 'flex' : 'none';
  if (pct == null) $('ovBar').style.display = 'none';
  else { $('ovBar').style.display = 'block'; $('ovBar').firstElementChild.style.width = Math.round(pct) + '%'; }
}
const show = (id, on=true) => $(id).classList.toggle('hidden', !on);

const params = new URLSearchParams(location.search);
const proofId = params.get('id');
const partId  = params.get('part');
let imgs = [], vIndex = 0;

(async function init(){
  if (!proofId) return fail('לא נמצא מזהה בכתובת.');
  let rec;
  try { rec = await (await fetch(`${_FBURL}/customerProofs/${proofId}.json`)).json(); }
  catch(e){ return fail('שגיאה בטעינה.'); }
  if (!rec) return fail('העיתון לא נמצא או הוסר.');
  $('sub').textContent = [rec.customer, rec.title].filter(Boolean).join(' · ') || 'סולן הדפסות';

  // איזה קובץ להציג: ריצה מסוימת (part), עיתון מלא, או בוחר ריצות
  let url = null, label = '';
  var cacheUrl = '', cacheAt = 0;
  if (partId && rec.parts && rec.parts[partId]) { var pt=rec.parts[partId]; url = pt.fileUrl; label = pt.name || ''; cacheUrl = pt.pagesUrl||''; cacheAt = pt.pagesReadyAt||0; }
  else if (rec.fileUrl) { url = rec.fileUrl; cacheUrl = rec.pagesUrl||''; cacheAt = rec.pagesReadyAt||0; }
  else if (rec.parts && Object.keys(rec.parts).length) {
    // עבודה לפי ריצות — הצג בורר ריצות לצפייה
    showOverlay('', false);
    const parts = Object.entries(rec.parts).sort((a,b)=>(a[1].approvedAt||0)-(b[1].approvedAt||0));
    $('picker').innerHTML = '<div class="parts-pick"><div style="text-align:center;font-weight:800;margin-bottom:4px">בחר/י ריצה לצפייה:</div>'
      + parts.map(([pid,p])=>`<a href="?id=${proofId}&part=${pid}">📄 ${esc(p.name||pid)} — ${p.pageCount||''} עמ'</a>`).join('')
      + '</div>';
    show('picker', true);
    return;
  } else { return fail('עדיין לא הועלה/אושר קובץ לעיתון זה.'); }

  if (label) $('ttl').textContent = 'צפייה — ' + label;

  // ── פתיחה מהירה: אם יש תצוגה מרונדרת שמורה ועדכנית (פחות מ-12 שעות) — טוען אותה מיידית ללא רינדור ──
  var FRESH_MS = 12 * 60 * 60 * 1000;
  if (cacheUrl && cacheAt && (Date.now() - cacheAt) < FRESH_MS) {
    try {
      showOverlay('טוען תצוגה מהירה…', true, 0);
      imgs = await (await fetch(cacheUrl)).json();
      if (Array.isArray(imgs) && imgs.length) {
        showOverlay('', false); show('viewer', true); renderViewer();
        return;
      }
    } catch(e){ console.warn('quick-cache failed, falling back to PDF render:', e); }
  }

  try {
    const buf = await (await fetch(url)).arrayBuffer();
    showOverlay('מרנדר עמודים…', true, 0);
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    imgs = new Array(pdf.numPages);
    for (let i = 1; i <= pdf.numPages; i++) {
      imgs[i-1] = await renderPage(pdf, i);
      showOverlay('מרנדר עמודים…', true, Math.round(i/pdf.numPages*100));
      if (i % 3 === 0) renderViewer();
    }
    showOverlay('', false); show('viewer', true); renderViewer();
  } catch(e){ console.error(e); fail('שגיאה בטעינת הקובץ.\n' + (e&&e.message||'')); }
})();

async function renderPage(pdf, pageNo){
  const page = await pdf.getPage(pageNo);
  const v1 = page.getViewport({ scale:1 });
  const scale = Math.min(2.5, RENDER_H / v1.height);
  const vp = page.getViewport({ scale });
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.floor(vp.width)); c.height = Math.max(1, Math.floor(vp.height));
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  page.cleanup();
  return c.toDataURL('image/jpeg', 0.85);
}

// דפדוף כפולה RTL
function showingPages(){
  if (!imgs.length) return [];
  if (vIndex === 0) return [0];
  const left = vIndex % 2 === 1 ? vIndex : vIndex - 1;
  return [left, left + 1].filter(i => i < imgs.length);
}
function renderViewer(){
  const spread = $('spread');
  if (!imgs.length) return;
  const s = showingPages();
  $('vlabel').textContent = `עמוד ${s.map(i=>i+1).join('–')} מתוך ${imgs.length}`;
  $('vprev').disabled = vIndex <= 0;
  $('vnext').disabled = s[s.length-1] >= imgs.length - 1;
  spread.innerHTML = s.map(i => `<div class="page"><img src="${imgs[i]}" alt=""><div class="pgnum">עמוד ${i+1}</div></div>`).join('');
}
function step(d){
  if (vIndex === 0) vIndex = d > 0 ? 1 : 0;
  else vIndex = Math.max(0, Math.min(vIndex + d*2, imgs.length - 1));
  if (vIndex > 0 && vIndex % 2 === 0) vIndex -= 1;
  renderViewer();
}
$('vprev').onclick = () => step(-1);
$('vnext').onclick = () => step(+1);
$('vfs').onclick = () => { const v=$('viewer'); if (document.fullscreenElement) document.exitFullscreen(); else (v.requestFullscreen||v.webkitRequestFullscreen).call(v); };
document.addEventListener('keydown', e => { if (e.key==='ArrowLeft') step(+1); if (e.key==='ArrowRight') step(-1); });

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fail(msg){ showOverlay(msg, true); throw new Error(msg); }
</script>
</body>
</html>

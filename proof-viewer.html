<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>אישור פרופר — סולן הדפסות</title>
<style>
  :root { --green:#16a34a; --red:#dc2626; --ink:#1f2937; --line:#e5e7eb; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, "Segoe UI", Arial, sans-serif;
    background: #f3f4f6; color: var(--ink); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  header { padding: 16px; text-align: center; }
  header h1 { font-size: 1.1rem; margin: 0; font-weight: 700; }
  header .sub { font-size: .8rem; color: #6b7280; margin-top: 2px; }

  #stage {
    display: flex; gap: 2px; justify-content: center;
    background: #d1d5db; padding: 8px; border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,.12); max-width: 96vw;
  }
  #stage canvas { display: block; height: 64vh; width: auto; background: #fff; max-width: 46vw; }

  #nav { display: flex; align-items: center; gap: 18px; margin: 14px 0; }
  #nav button {
    font-size: 1.1rem; padding: 8px 18px; border: 1.5px solid var(--line);
    background: #fff; border-radius: 8px; cursor: pointer;
  }
  #nav button:disabled { opacity: .35; cursor: default; }
  #label { min-width: 130px; text-align: center; font-variant-numeric: tabular-nums; }

  #decision { display: flex; gap: 16px; margin: 8px 16px 32px; flex-wrap: wrap; justify-content: center; }
  #decision button {
    font-size: 1.25rem; font-weight: 800; padding: 18px 36px; border: none;
    border-radius: 12px; cursor: pointer; color: #fff; min-width: 220px;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
  }
  #btnApprove { background: var(--green); }
  #btnReject  { background: var(--red); }
  #decision button:active { transform: translateY(1px); }

  #status { font-size: 1.1rem; font-weight: 700; text-align: center; padding: 24px; }
  .hidden { display: none !important; }
  #overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,.94);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; color: #374151; z-index: 50; text-align: center; padding: 24px;
    white-space: pre-line;
  }
  #rejectBox { max-width: 420px; width: 100%; }
  #rejectBox textarea {
    width: 100%; min-height: 90px; padding: 10px; border: 1.5px solid var(--line);
    border-radius: 8px; font-family: inherit; font-size: .95rem; resize: vertical;
  }
</style>
</head>
<body>

<div id="overlay">טוען פרופר…</div>

<header>
  <h1>אישור פרופר לדפוס</h1>
  <div class="sub" id="subtitle">סולן הדפסות</div>
</header>

<div id="stage"></div>

<div id="nav" class="hidden">
  <button id="prev">‹ הקודם</button>
  <span id="label"></span>
  <button id="next">הבא ›</button>
</div>

<div id="decision" class="hidden">
  <button id="btnApprove">✓ מאשר לדפוס</button>
  <button id="btnReject">✗ דוחה — נדרש תיקון</button>
</div>

<div id="status" class="hidden"></div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

// ── Firebase REST — אותו פרויקט כמו האפליקציה, בלי SDK ──
const _FBURL = 'https://solan-printing-default-rtdb.europe-west1.firebasedatabase.app';

const fbGet = async path => {
  const r = await fetch(`${_FBURL}/${path}.json`);
  return r.ok ? r.json() : null;
};
// PATCH = עדכון שדות בודדים בלי לדרוס את כל הרשומה
const fbPatch = async (path, fields) => {
  const r = await fetch(`${_FBURL}/${path}.json`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(fields),
  });
  return r.ok;
};
// מוריד את ה-PDF מה-URL שנשמר ברשומה (Cloudinary CDN).
const fetchPdf = async url => {
  const r = await fetch(url);
  if (!r.ok) throw new Error('הקובץ לא נמצא');
  return r.arrayBuffer();
};

const $ = id => document.getElementById(id);
const overlay = $('overlay');

// ── 1. קריאת ה-ID מה-URL ──
const proofId = new URLSearchParams(location.search).get('id');
if (!proofId) fail('לא נמצא מזהה פרופר בכתובת.');

let proofData;

(async function load() {
  try {
    proofData = await fbGet('customerProofs/' + proofId);
    if (!proofData) return fail('הפרופר לא נמצא או הוסר.');

    if (proofData.status && proofData.status !== 'pending_approval') {
      return showFinal(proofData.status, true);
    }
    if (proofData.title) $('subtitle').textContent = proofData.title;

    // ── 2. שליפת ה-PDF (Cloudinary) ──
    if (!proofData.fileUrl) return fail('לא נמצא קובץ לפרופר זה.');
    const buf = await fetchPdf(proofData.fileUrl);

    // ── 3. רינדור החוברת ──
    overlay.textContent = 'מרנדר עמודים…';
    const pages = await renderPdf(buf);
    overlay.classList.add('hidden');

    startFlipbook(pages);
    $('nav').classList.remove('hidden');
    $('decision').classList.remove('hidden');
  } catch (e) {
    console.error(e);
    fail('שגיאה בטעינת הפרופר.\n\nפרטים (לבית הדפוס):\n' + (e && e.message ? e.message : e));
  }
})();

async function renderPdf(data, scale = 1.6) {
  const pdf = await pdfjsLib.getDocument({ data }).promise;
  const out = new Array(pdf.numPages);
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale });
    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    page.cleanup();
    out[i - 1] = c;
  }
  return out;
}

// ── דפדפן חוברת (תצוגת צמד, RTL) ──
function startFlipbook(pages) {
  const stage = $('stage'), label = $('label');
  const total = pages.length;
  let index = 0;
  const showing = () => {
    if (index === 0) return [0];
    const left = index % 2 === 1 ? index : index - 1;
    return [left, left + 1].filter(i => i < total);
  };
  const clamp = i => Math.max(0, Math.min(i, total - 1));
  function render() {
    const s = showing();
    stage.innerHTML = '';
    // המיכל כבר dir=rtl — בפלקס הפריט הראשון יושב מימין. סדר עולה = עמוד נמוך מימין.
    for (const i of s) stage.appendChild(pages[i]);
    label.textContent = `עמוד ${s.map(i => i + 1).join('–')} מתוך ${total}`;
    $('prev').disabled = index <= 0;
    $('next').disabled = s[s.length - 1] >= total - 1;
  }
  function step(d) {
    if (index === 0) index = d > 0 ? 1 : 0;
    else index = clamp(index + d * 2);
    if (index > 0 && index % 2 === 0) index -= 1;
    render();
  }
  $('prev').onclick = () => step(-1);
  $('next').onclick = () => step(+1);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  step(+1);
    if (e.key === 'ArrowRight') step(-1);
  });
  render();
}

// ── 4. החלטת הלקוח ──
$('btnApprove').onclick = () => decide('approved');
$('btnReject').onclick  = () => askReject();

async function decide(status, note) {
  $('decision').classList.add('hidden');
  overlay.textContent = 'שומר…';
  overlay.classList.remove('hidden');
  const ok = await fbPatch('customerProofs/' + proofId, {
    status,
    customerNote: note || '',
    decidedAt: Date.now(),
    decidedVia: 'customer-viewer',
  });
  if (ok) { overlay.classList.add('hidden'); showFinal(status, false); }
  else    { overlay.textContent = 'שמירה נכשלה. בדוק חיבור ונסה שוב.'; }
}

function askReject() {
  $('decision').classList.add('hidden');
  const wrap = document.createElement('div');
  wrap.id = 'rejectBox';
  wrap.innerHTML = `
    <p style="margin:0 0 8px;font-weight:700">מה צריך לתקן? (אופציונלי)</p>
    <textarea id="rejNote" placeholder="פרט/י את התיקון הנדרש…"></textarea>
    <div style="display:flex;gap:10px;margin-top:10px;justify-content:center">
      <button id="rejSend" style="background:var(--red);color:#fff;border:none;
        padding:12px 24px;border-radius:8px;font-weight:800;cursor:pointer">שלח דחייה</button>
      <button id="rejCancel" style="background:#fff;border:1.5px solid var(--line);
        padding:12px 24px;border-radius:8px;cursor:pointer">ביטול</button>
    </div>`;
  $('decision').after(wrap);
  $('rejSend').onclick = () => decide('rejected', $('rejNote').value.trim());
  $('rejCancel').onclick = () => { wrap.remove(); $('decision').classList.remove('hidden'); };
}

// ── מסכי סיום ──
function showFinal(status, already) {
  $('stage').classList.add('hidden');
  $('nav').classList.add('hidden');
  $('decision').classList.add('hidden');
  document.getElementById('rejectBox')?.remove();
  const el = $('status'); el.classList.remove('hidden');
  const pre = already ? 'הפרופר כבר ' : '';
  if (status === 'approved') {
    el.innerHTML = `<div style="color:var(--green);font-size:2rem">✓</div>${pre}אושר לדפוס. תודה!`;
  } else {
    el.innerHTML = `<div style="color:var(--red);font-size:2rem">✗</div>${pre}נדחה — הועבר לתיקון. ניצור קשר.`;
  }
}

function fail(msg) {
  overlay.textContent = msg;
  overlay.classList.remove('hidden');
  throw new Error(msg);
}
</script>
</body>
</html>
